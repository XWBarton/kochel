server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # audio files can be large; streaming range-requests need this off so
    # nginx doesn't buffer the whole response before forwarding it
    proxy_buffering off;

    # whole-folder FLAC uploads can be large multipart bodies; nginx's
    # default (1MB) rejects those with a 413 before they reach the app
    client_max_body_size 0;

    location /api/ {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
    }

    location / {
        try_files $uri /index.html;
    }
}
